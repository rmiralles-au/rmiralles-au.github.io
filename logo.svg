<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5E080"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9A7020"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#09090f"/>

  <!-- Subtle outer ring -->
  <circle cx="250" cy="235" r="195" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.2"/>

  <!-- Crown — 3 clean peaks -->
  <polygon
    points="
      148,295
      148,268
      188,192
      220,262
      250,162
      280,262
      312,192
      352,268
      352,295
    "
    fill="url(#g)"
    filter="url(#soft)"
  />

  <!-- Crown base bottom edge (caps the crown) -->
  <rect x="148" y="283" width="204" height="14" rx="2" fill="url(#g)"/>

  <!-- Jewel dots on peak tips -->
  <circle cx="250" cy="164" r="8.5" fill="#FDF0A0" opacity="0.95"/>
  <circle cx="189" cy="194" r="5.5" fill="#FDF0A0" opacity="0.85"/>
  <circle cx="311" cy="194" r="5.5" fill="#FDF0A0" opacity="0.85"/>

  <!-- Thin separator line -->
  <line x1="195" y1="322" x2="305" y2="322" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>

  <!-- AU -->
  <text
    x="250" y="400"
    text-anchor="middle"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="88"
    font-weight="400"
    fill="url(#g)"
    letter-spacing="12"
    filter="url(#soft)"
  >AU</text>

</svg>
